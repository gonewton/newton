version: "2.0"
mode: workflow_graph
workflow:
  settings:
    entry_task: run-child
    max_time_seconds: 30
    parallel_limit: 1
    continue_on_error: false
    max_task_iterations: 3
    max_workflow_iterations: 10
    io:
      result_map:
        child_status: "$expr: tasks['run-child'].result.status"
  tasks:
    - id: run-child
      operator: WorkflowOperator
      params:
        workflow_path: child_workflow.yaml
      terminal: success
