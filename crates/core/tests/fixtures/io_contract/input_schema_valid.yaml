version: "2.0"
mode: workflow_graph
workflow:
  settings:
    entry_task: start
    max_time_seconds: 30
    parallel_limit: 1
    continue_on_error: false
    max_task_iterations: 3
    max_workflow_iterations: 10
    io:
      input_schema:
        type: object
        properties:
          repo:
            type: string
          branch:
            type: string
        required:
          - repo
      result_map:
        status: ok
  tasks:
    - id: start
      operator: NoOpOperator
      params: {}
      terminal: success
