version: '2.0'
mode: workflow_graph
metadata:
  name: rust-workflow
  description: Implement from a repo-local spec path. Prefer raw_spec_path + board_issue_number + board_item_title (develop.sh); workflow copies into tmp/<issue>-<slug>.md before git work.
triggers:
  type: manual
  schema_version: '1.0'
  payload:
    prompt: ''
    raw_spec_path: ''
    board_item_id: ''
    board_issue_number: ''
    board_item_title: ''
    skip_gh_pr_approve: 'true'
workflow:
  settings:
    entry_task: clean_check
    max_time_seconds: 604800
    parallel_limit: 1
    continue_on_error: false
    max_task_iterations: 15000
    max_workflow_iterations: 500
    default_engine: opencode
    allow_env_fn: true
    command_operator:
      allow_shell: true
    artifact_storage:
      base_path: .newton/artifacts
      max_inline_bytes: 4194304
      max_artifact_bytes: 104857600
      max_total_bytes: 1073741824
      retention_hours: 168
      cleanup_policy: lru
  context:
    preamble: |-
      Implement the following spec in the target source code target.
      After you have applied the changes and ./scripts/run-tests.sh completes with no errors, print exactly <status>COMPLETED</status> in your final output.
    codescene_preamble: Fix code health issues reported by CodeScene. Work in the target source code base; run ./scripts/run-tests.sh to verify. Do not require a COMPLETED marker.
    precommit_fix_preamble: |-
      The pre-commit hook rejected a commit. The full hook output is below.
      Fix all reported issues in the codebase. Run ./scripts/run-tests.sh to verify.
      Do not attempt to commit; only fix the code.
    validation_preamble: |-
      You are a reviewer. You will be given the spec path (read the spec file in the workspace) and a bounded diff vs main (stat plus truncated patch).
      Determine whether the provided diff fully implements the given spec.
      Reply with exactly one of <status>VALID</status> or <status>INVALID</status>.
      If INVALID, include a single block <feedback>...</feedback> with clear, actionable feedback.
  tasks:
    - id: clean_check
      operator: GitOperator
      params:
        operation: clean_check
      transitions:
        - to: sync_main
          priority: 0
          when:
            $expr: tasks.clean_check.output.ok == true
        - to: fail_dirty_tree
          priority: 10
      name: Check clean working tree
    - id: fail_dirty_tree
      operator: CommandOperator
      params:
        shell: true
        cmd: |
          echo "Precondition failed: working tree has changes. Commit or stash before develop." >&2
          exit 1
        capture_stdout: false
      terminal: failure
    - id: sync_main
      operator: GitOperator
      params:
        operation: sync_main
      transitions:
        - to: resolve_board_ids
      name: Sync main branch
    - id: resolve_board_ids
      operator: GhOperator
      params:
        operation: project_resolve_board
        owner:
          $expr: env("GH_PROJECT_OWNER")
        project_number:
          $expr: env("GH_PROJECT_NUMBER")
      transitions:
        - to: move_to_in_progress
      name: Pick next Issue
    - id: move_to_in_progress
      operator: GhOperator
      params:
        operation: project_item_set_status
        item_id:
          $expr: triggers.board_item_id
        board:
          $expr: tasks.resolve_board_ids.output
        status: In progress
        on_error: warn
      transitions:
        - to: prepare_spec_paths
      name: Move Issue to In Progress
    - id: prepare_spec_paths
      operator: CommandOperator
      params:
        shell: true
        capture_stdout: true
        env:
          ISSUE:
            $expr: triggers.board_issue_number
          TITLE:
            $expr: triggers.board_item_title
          RAW_SPEC:
            $expr: triggers.raw_spec_path
          LEGACY_PROMPT:
            $expr: triggers.prompt
        cmd: |
          set -eo pipefail
          mkdir -p .newton/plan tmp
          slugify() {
            s=$(printf '%s' "${TITLE:-}" | iconv -f utf-8 -t ascii//TRANSLIT 2>/dev/null || printf '%s' "${TITLE:-}")
            s=$(printf '%s' "$s" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g')
            [ -z "$s" ] && s="spec"
            printf '%s' "$s" | cut -c1-60 | sed -E 's/-+$//'
          }
          if [ -n "$RAW_SPEC" ] && [ -f "$RAW_SPEC" ]; then
            slug=$(slugify)
            OUT="tmp/${ISSUE}-${slug}.md"
            if [ "$RAW_SPEC" != "$OUT" ]; then
              cp "$RAW_SPEC" "$OUT"
            fi
          else
            OUT="$LEGACY_PROMPT"
            if [ -z "$OUT" ] || [ ! -f "$OUT" ]; then
              echo "prepare_spec_paths: set raw_spec_path to an existing file or pass prompt with a readable path"
              exit 1
            fi
          fi
          printf '%s\n' "$OUT" > .newton/plan/.develop-prompt-path
          echo "spec_path=$OUT"
      transitions:
        - to: read_develop_spec_path
    - id: read_develop_spec_path
      operator: CommandOperator
      params:
        shell: true
        capture_stdout: true
        cmd: |
          set -eo pipefail
          printf '%s' "$(cat .newton/plan/.develop-prompt-path)"
      transitions:
        - to: create_branch
    - id: create_branch
      operator: GitOperator
      params:
        operation: create_branch
        name:
          $expr: '"feature/" + file_stem(tasks.read_develop_spec_path.output.stdout)'
      transitions:
        - to: load_spec
      name: Create Branch
    - id: load_spec
      operator: CommandOperator
      params:
        shell: true
        env:
          SPEC_PATH:
            $expr: tasks.read_develop_spec_path.output.stdout
        cmd: |
          set -e
          cat "$SPEC_PATH"
        capture_stdout: true
        capture_stderr: true
      transitions:
        - to: implement_spec
    - id: implement_spec
      operator: AgentOperator
      max_iterations: 3
      params:
        engine:
          $expr: develop_primary_engine
        model:
          $expr: develop_primary_model
        prompt:
          $expr: 'context.preamble + "\n\nSpec path: " + tasks.read_develop_spec_path.output.stdout + "\n\nSpec content:\n" + tasks.load_spec.output.stdout'
        signals:
          complete: <status>COMPLETED</status>
      transitions:
        - to: run_tests
          priority: 0
          when:
            $expr: tasks.implement_spec.output.signal == "complete"
        - to: retry_implementation
          priority: 10
    - id: run_tests
      max_iterations: 60
      operator: CommandOperator
      params:
        shell: true
        cmd: ./scripts/run-tests.sh
        capture_stdout: true
        capture_stderr: true
      transitions:
        - to: snapshot_commit
          priority: 0
          when:
            $expr: tasks.run_tests.output.success == true
        - to: fix_test_failures
          priority: 10
    - id: fix_test_failures
      operator: AgentOperator
      max_iterations: 3
      params:
        engine:
          $expr: develop_secondary_engine
        model:
          $expr: develop_secondary_model
        prompt:
          $expr: 'context.preamble + "\n\nSpec path: " + tasks.read_develop_spec_path.output.stdout + "\n\nSpec content:\n" + tasks.load_spec.output.stdout + "\n\nTests failed. Fix the issues and re-run ./scripts/run-tests.sh:\n" + tasks.run_tests.output.stdout'
      transitions:
        - to: run_tests
    - id: snapshot_commit
      max_iterations: 90
      operator: GitOperator
      params:
        operation: commit
        message:
          $expr: '"chore(develop): " + file_stem(tasks.read_develop_spec_path.output.stdout)'
        allow_empty: false
      transitions:
        - to: get_diff
          priority: 0
          when:
            $expr: tasks.snapshot_commit.output.committed == true || tasks.snapshot_commit.output.skipped == true
        - to: fix_snapshot_precommit
          priority: 5
          when:
            $expr: tasks.snapshot_commit.output.precommit_failed == true
        - to: fix_snapshot_precommit
          priority: 10
    - id: fix_snapshot_precommit
      operator: AgentOperator
      max_iterations: 3
      params:
        engine:
          $expr: develop_secondary_engine
        model:
          $expr: develop_secondary_model
        prompt:
          $expr: context.precommit_fix_preamble + "\n\nPre-commit hook rejected the snapshot commit. Run ./scripts/run-tests.sh to verify fixes."
      transitions:
        - to: snapshot_commit
    - id: get_diff
      max_iterations: 60
      operator: GitOperator
      params:
        operation: diff
        base: main
        max_bytes: 262144
      transitions:
        - to: validation_preflight
    - id: validation_preflight
      operator: CommandOperator
      params:
        shell: true
        capture_stdout: true
        env:
          SPEC_PATH:
            $expr: tasks.read_develop_spec_path.output.stdout
        cmd: |
          set -e
          SPEC_BYTES=$(wc -c < "$SPEC_PATH" | tr -d ' ')
          DIFF_BYTES=$(git diff main...HEAD | wc -c | tr -d ' ')
          PREAMBLE_BUDGET=8192
          TOTAL=$((SPEC_BYTES + DIFF_BYTES + PREAMBLE_BUDGET))
          MAX_BYTES=400000
          echo "spec_bytes=$SPEC_BYTES diff_bytes=$DIFF_BYTES total_estimate=$TOTAL max_bytes=$MAX_BYTES"
          if [ "$TOTAL" -gt "$MAX_BYTES" ]; then
            echo "VALIDATION_PREFLIGHT: oversize"
            exit 1
          fi
          echo "VALIDATION_PREFLIGHT: ok"
      transitions:
        - to: validate_against_spec
          priority: 0
          when:
            $expr: 'contains(tasks.validation_preflight.output.stdout, "VALIDATION_PREFLIGHT: ok")'
        - to: fail_validation_oversized
          priority: 10
    - id: fail_validation_oversized
      operator: CommandOperator
      params:
        shell: true
        cmd: |
          echo "develop: validation preflight failed — spec+diff exceeds safe prompt budget." >&2
          echo "See validation_preflight output for byte counts. Split the change or spec before re-running." >&2
          exit 1
        capture_stdout: false
      terminal: failure
    - id: validate_against_spec
      max_iterations: 3
      operator: AgentOperator
      params:
        engine:
          $expr: develop_primary_engine
        model:
          $expr: develop_primary_model
        require_signal: true
        prompt:
          $expr: 'context.validation_preamble + "\n\nSpec path (read in workspace): " + tasks.read_develop_spec_path.output.stdout + "\n\nDiff vs main (stat + bounded diff):\n" + tasks.get_diff.output.stat + "\n\n" + tasks.get_diff.output.patch'
        signals:
          valid: <status>VALID</status>
          invalid: <status>INVALID</status>
      transitions:
        - to: analyze_code_health
          priority: 0
          when:
            $expr: tasks.validate_against_spec.output.signal == "valid"
        - to: load_validation_feedback
          priority: 10
          when:
            $expr: tasks.validate_against_spec.output.signal == "invalid"
    - id: load_validation_feedback
      operator: CommandOperator
      params:
        shell: true
        capture_stdout: true
        env:
          VALIDATION_STDOUT_ARTIFACT:
            $expr: tasks.validate_against_spec.output.stdout_artifact
        cmd: cat "$VALIDATION_STDOUT_ARTIFACT"
      transitions:
        - to: implement_feedback
    - id: implement_feedback
      operator: AgentOperator
      max_iterations: 5
      params:
        engine:
          $expr: develop_primary_engine
        model:
          $expr: develop_primary_model
        prompt:
          $expr: 'context.preamble + "\n\nSpec path: " + tasks.read_develop_spec_path.output.stdout + "\n\nSpec content:\n" + tasks.load_spec.output.stdout + "\n\nValidation feedback (address and re-run tests):\n" + tasks.load_validation_feedback.output.stdout'
        signals:
          complete: <status>COMPLETED</status>
      transitions:
        - to: run_tests
    - id: analyze_code_health
      operator: CommandOperator
      params:
        shell: true
        cmd: cs delta --output-format json
        capture_stdout: true
      transitions:
        - to: fix_code_health
          priority: 0
          when:
            $expr: contains(tasks.analyze_code_health.output.stdout, "{")
        - to: git_stage
          priority: 10
    - id: fix_code_health
      operator: AgentOperator
      params:
        engine:
          $expr: develop_secondary_engine
        model:
          $expr: develop_secondary_model
        prompt:
          $expr: context.codescene_preamble + "\n\nCodeScene delta report (JSON):\n" + tasks.analyze_code_health.output.stdout
      transitions:
        - to: git_stage
    - id: git_stage
      operator: GitOperator
      params:
        operation: stage
        exclude:
          - "test_results.*"
      transitions:
        - to: no_changes_done
          priority: 0
          when:
            $expr: tasks.git_stage.output.has_staged == false
        - to: git_commit
          priority: 10
          when:
            $expr: tasks.git_stage.output.has_staged == true
    - id: no_changes_done
      operator: CommandOperator
      params:
        shell: true
        cmd: echo "No changes to commit; skipping PR."
        capture_stdout: false
      terminal: success
    - id: git_commit
      operator: GitOperator
      params:
        operation: commit
        message:
          $expr: '"feat: implement " + file_stem(tasks.read_develop_spec_path.output.stdout)'
        allow_empty: false
      transitions:
        - to: git_push
          priority: 0
          when:
            $expr: tasks.git_commit.output.committed == true || tasks.git_commit.output.skipped == true
        - to: fix_final_precommit
          priority: 5
          when:
            $expr: tasks.git_commit.output.precommit_failed == true
        - to: fix_final_precommit
          priority: 10
    - id: fix_final_precommit
      operator: AgentOperator
      max_iterations: 3
      params:
        engine:
          $expr: develop_secondary_engine
        model:
          $expr: develop_secondary_model
        prompt:
          $expr: context.precommit_fix_preamble + "\n\nPre-commit hook rejected the final commit. Run ./scripts/run-tests.sh to verify fixes."
      transitions:
        - to: git_commit
    - id: git_push
      operator: GitOperator
      params:
        operation: push
        remote: origin
        set_upstream: true
        retry_count: 3
        retry_delay_ms: 5000
      transitions:
        - to: gh_create_pr
    - id: gh_create_pr
      operator: GhOperator
      params:
        operation: pr_create
        base: main
        title:
          $expr: '"feat: implement " + file_stem(tasks.read_develop_spec_path.output.stdout)'
        body: Implements spec. Merge with squash.
        retry_count: 3
        retry_delay_ms: 5000
      transitions:
        - to: move_to_in_review
    - id: move_to_in_review
      operator: GhOperator
      params:
        operation: project_item_set_status
        item_id:
          $expr: triggers.board_item_id
        board:
          $expr: tasks.resolve_board_ids.output
        status: In review
        on_error: warn
      transitions:
        - to: poll_pr
          priority: 0
          when:
            $expr: triggers.skip_gh_pr_approve == "true"
        - to: gh_approve_pr
          priority: 10
          when:
            $expr: triggers.skip_gh_pr_approve != "true"
    - id: gh_approve_pr
      operator: GhOperator
      params:
        operation: pr_approve
        pr_number:
          $expr: tasks.gh_create_pr.output.pr_number
      transitions:
        - to: poll_pr
    - id: poll_pr
      operator: GhOperator
      max_iterations: 15000
      timeout_ms: 120000
      params:
        operation: pr_view
        pr:
          $expr: tasks.gh_create_pr.output.pr_number
      transitions:
        - to: merge_git_cleanup
          priority: 0
          when:
            $expr: tasks.poll_pr.output.state == "MERGED"
        - to: move_to_ready_on_close
          priority: 1
          when:
            $expr: tasks.poll_pr.output.state == "CLOSED"
        - to: sleep_merge_wait
          priority: 5
          when:
            $expr: tasks.poll_pr.output.state == "OPEN"
        - to: sleep_merge_unknown
          priority: 10
          when:
            $expr: tasks.poll_pr.output.state != "OPEN" && tasks.poll_pr.output.state != "MERGED" && tasks.poll_pr.output.state != "CLOSED"
      name: Wait for PR Acceptance
    - id: sleep_merge_wait
      operator: CommandOperator
      max_iterations: 15000
      params:
        shell: true
        cmd: sleep 60
        capture_stdout: false
      transitions:
        - to: poll_pr
    - id: sleep_merge_unknown
      operator: CommandOperator
      max_iterations: 15000
      params:
        shell: true
        cmd: echo "Unexpected PR state; waiting 30s"; sleep 30
        capture_stdout: false
      transitions:
        - to: poll_pr
    - id: move_to_ready_on_close
      operator: GhOperator
      params:
        operation: project_item_set_status
        item_id:
          $expr: triggers.board_item_id
        board:
          $expr: tasks.resolve_board_ids.output
        status: Ready
        on_error: warn
      transitions:
        - to: fail_pr_closed
    - id: fail_pr_closed
      operator: CommandOperator
      params:
        shell: true
        cmd: echo "PR closed without merge" >&2; exit 1
        capture_stdout: false
      terminal: failure
    - id: merge_git_cleanup
      operator: GitOperator
      timeout_ms: 600000
      params:
        operation: cleanup_merge
      transitions:
        - to: move_to_done
    - id: move_to_done
      operator: GhOperator
      params:
        operation: project_item_set_status
        item_id:
          $expr: triggers.board_item_id
        board:
          $expr: tasks.resolve_board_ids.output
        status: Done
        on_error: warn
      transitions:
        - to: success
    - id: success
      operator: CommandOperator
      params:
        shell: true
        cmd: echo "Job is completed based on opencode output" | tee /dev/tty
        capture_stdout: false
      terminal: success
    - id: retry_implementation
      operator: CommandOperator
      max_iterations: 3
      params:
        shell: true
        cmd: echo "Job failed (status != COMPLETED), retrying implement_spec task..."
        capture_stdout: false
      transitions:
        - to: implement_spec
