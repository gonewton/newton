version: "2.0"
mode: "workflow_graph"
metadata:
  name: "Scenario 44: Barrier Invalid Params"
workflow:
  settings:
    entry_task: "task_a"
    max_time_seconds: 60
    parallel_limit: 2
    continue_on_error: false
    max_task_iterations: 10
    max_workflow_iterations: 100
  tasks:
    - id: "task_a"
      operator: "NoOpOperator"
    - id: "sync_barrier"
      operator: "barrier"
      params:
        expected: "not_an_array"
      transitions:
        - to: "terminal_task"
    - id: "terminal_task"
      operator: "NoOpOperator"
      terminal: success
