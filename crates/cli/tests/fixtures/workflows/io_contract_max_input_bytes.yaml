version: "2.0"
mode: workflow_graph
workflow:
  settings:
    entry_task: start
    max_time_seconds: 30
    parallel_limit: 1
    continue_on_error: false
    max_task_iterations: 1
    max_workflow_iterations: 5
    io_settings:
      max_input_bytes: 1
  tasks:
    - id: start
      operator: NoOpOperator
      params: {}
      terminal: success
