version: "2.0"
mode: "workflow_graph"
metadata:
  name: "Scenario 43: Transition IncludeIf Eval Error"
workflow:
  settings:
    entry_task: "start"
    max_time_seconds: 60
    parallel_limit: 1
    continue_on_error: false
    max_task_iterations: 10
    max_workflow_iterations: 100
  tasks:
    - id: "start"
      operator: "NoOpOperator"
      transitions:
        - to: "bad_branch"
          include_if: { $expr: "undefined_fn(){{{" }
        - to: "end"
    - id: "bad_branch"
      operator: "NoOpOperator"
      terminal: success
    - id: "end"
      operator: "NoOpOperator"
      terminal: success
