version: "2.0"
mode: "workflow_graph"
metadata:
  name: "P5b: --verbose prints captured task output"
workflow:
  settings:
    entry_task: "echo_marker"
    max_time_seconds: 30
    parallel_limit: 1
    continue_on_error: false
    max_task_iterations: 1
    max_workflow_iterations: 5
    command_operator:
      allow_shell: true
  tasks:
    - id: "echo_marker"
      operator: "CommandOperator"
      params:
        cmd: "echo VERBOSE_MARKER_9f3a1c"
        shell: true
      terminal: success
