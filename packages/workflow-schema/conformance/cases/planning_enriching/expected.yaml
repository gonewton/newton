version: '2.0'
mode: workflow_graph
metadata:
  name: planning-enriching
  description: 'Pure spec enrichment (no GitHub). Invoked via WorkflowOperator from planner.yaml, or standalone: newton run planning_enriching.yaml --arg prompt=... --arg output_path=... (--set engines).'
triggers:
  type: manual
  schema_version: '1.0'
  payload:
    prompt: ''
    output_path: ''
workflow:
  settings:
    entry_task: enrich_spec
    max_time_seconds: 999999999
    parallel_limit: 1
    continue_on_error: false
    max_task_iterations: 3
    max_workflow_iterations: 15
    default_engine: codex
    command_operator:
      allow_shell: true
  context: {}
  tasks:
    - id: enrich_spec
      operator: AgentOperator
      max_iterations: 2
      params:
        engine:
          $expr: develop_primary_engine
        model:
          $expr: develop_primary_model
        prompt:
          $expr: 'context.preamble + "\n\nOutput format:\n- Write the full enriched markdown to the file " + triggers.output_path + " in the workspace (create directory if needed).\n- Write the list of aspect names that need user input (one per line) to .newton/plan/gaps.txt. If none need input, write a single line \"none\". Use only these aspect names when listing gaps: problem_statement, goals, current_behavior, design, schema_api, error_codes, acceptance_criteria, functionality_comparison, benefit, stages, breaking_changes, modified_files_table, dependencies, folder_structure, design_decisions, out_of_scope, references.\n\n---\nUser spec (path or content):\n\n" + triggers.prompt'
      transitions:
        - to: check_gaps
    - id: check_gaps
      operator: CommandOperator
      params:
        shell: true
        env:
          OUT:
            $expr: triggers.output_path
        cmd: |
          set -e
          if [ ! -f "$OUT" ]; then
            echo "check_gaps: enriched spec missing at ${OUT} (enrich agent must create this path)" >&2
            exit 1
          fi
          if grep -q "NEED_USER_INPUT" "$OUT"; then
            printf "has_gaps"
          else
            printf "no_gaps"
          fi
        capture_stdout: true
      transitions:
        - to: cat_gaps
          priority: 0
          when:
            $expr: tasks.check_gaps.output.stdout == "has_gaps"
        - to: finalize
          priority: 10
          when:
            $expr: tasks.check_gaps.output.stdout == "no_gaps"
    - id: cat_gaps
      operator: CommandOperator
      params:
        shell: true
        cmd: cat .newton/plan/gaps.txt 2>/dev/null || echo 'none'
        capture_stdout: true
      transitions:
        - to: clarify_spec
    - id: clarify_spec
      operator: AgentOperator
      max_iterations: 2
      params:
        engine:
          $expr: develop_primary_engine
        model:
          $expr: develop_primary_model
        prompt:
          $expr: '"You are running the newton-clarify-question protocol for a spec that still has unresolved gaps.\n\nSpec path: " + triggers.output_path + "\nGaps file: .newton/plan/gaps.txt\n\nSteps:\n1. Read the spec and collect every NEED_USER_INPUT tag with surrounding context.\n2. For each gap, ground at least two concrete alternatives in the actual codebase, lockfiles, and dependencies. Prefer evidence over guesses; list unverifiable claims in evidence_gaps.\n3. Pick a recommended alternative (primary_alternative_id must match one of alternatives[].id).\n\nOutput a single ```json fenced code block containing one object that validates against this schema (schema_version must be 1):\n{\n  \"schema_version\": 1,\n  \"spec_paths\": [\"<" + triggers.output_path + ">\"],\n  \"need_user_input\": [{\"tag\": string, \"excerpt\": string, \"location_hint\": string}],\n  \"context_notes\": [string],\n  \"evidence_gaps\": [string],\n  \"problem_statement\": string,\n  \"alternatives\": [{\"id\": \"<slug: ^[a-z][a-z0-9_-]*$>\", \"title\": string, \"pros\": [string], \"cons\": [string]}],\n  \"recommendation\": {\"summary\": string, \"rationale\": string, \"primary_alternative_id\": string, \"confidence\": \"low\"|\"medium\"|\"high\"}\n}\n\nRules:\n- alternatives must have at least 2 entries\n- alternatives[].id must be lowercase slugs (^[a-z][a-z0-9_-]*$)\n- recommendation.primary_alternative_id must equal one of the alternatives[].id values\n- Do NOT include defer or abort alternatives; the workflow adds those\n\nAfter producing the JSON block, write the JSON object (not the markdown mirror) to .newton/plan/clarify.json."'
      transitions:
        - to: validate_clarify
    - id: validate_clarify
      operator: CommandOperator
      params:
        shell: true
        cmd: |
          set -e
          CLARIFY=".newton/plan/clarify.json"
          if [ ! -f "$CLARIFY" ]; then
            echo "ERROR: clarify.json not written by clarify_spec agent" >&2
            exit 1
          fi
          jq -e '
            .schema_version == 1
            and (.spec_paths | length > 0)
            and (.need_user_input | length > 0)
            and (.problem_statement | length > 0)
            and (.alternatives | length >= 2)
            and (.recommendation.primary_alternative_id != null)
            and (
              .recommendation.primary_alternative_id as $rid
              | [.alternatives[].id] | contains([$rid])
            )
          ' "$CLARIFY" > /dev/null
        capture_stdout: false
      transitions:
        - to: present_decision
    - id: present_decision
      operator: CommandOperator
      params:
        shell: true
        cmd: |
          set -e
          CLARIFY=".newton/plan/clarify.json"
          PAYLOAD=$(jq -c '{
            decision_id: ("planning-enriching-" + (now | floor | tostring)),
            summary: .problem_statement,
            context_markdown: (
              "**Decision required for:** " + .problem_statement
              + "\n\n**Open gaps:**\n"
              + (.need_user_input | map("- **\(.tag)**: \(.excerpt) _(\(.location_hint))_") | join("\n"))
            ),
            options: (
              (.alternatives | map({
                id: .id,
                label: .title,
                detail_markdown: (
                  "**Pros:** " + (.pros | join(" · "))
                  + "\n\n**Cons:** " + (.cons | join(" · "))
                )
              }))
              + [
                {"id": "defer", "label": "Defer — keep placeholders, revisit later"},
                {"id": "abort", "label": "Abort — stop enrichment without merging"}
              ]
            ),
            recommendation: {
              option_id: .recommendation.primary_alternative_id,
              rationale_markdown: (
                .recommendation.rationale
                + ((.recommendation.confidence // "") | if . != "" then " *(confidence: " + . + ")*" else "" end)
              )
            }
          }' "$CLARIFY")
          CHOICE=$(ailoop ask --payload "$PAYLOAD" --json | jq -r '.response')
          printf "%s" "$CHOICE"
        capture_stdout: true
      transitions:
        - to: finalize
          priority: 0
          when:
            $expr: tasks.present_decision.output.stdout == "defer"
        - to: finalize
          priority: 1
          when:
            $expr: tasks.present_decision.output.stdout == "abort"
        - to: merge_spec
          priority: 10
    - id: merge_spec
      operator: AgentOperator
      max_iterations: 1
      params:
        engine:
          $expr: develop_primary_engine
        model:
          $expr: develop_primary_model
        prompt:
          $expr: '"Read the enriched spec at " + triggers.output_path + " and the clarifier output at .newton/plan/clarify.json.\n\nThe human selected option id: \"" + tasks.present_decision.output.stdout + "\"\n\nFind that alternative in clarify.json (alternatives[].id == \"" + tasks.present_decision.output.stdout + "\"). If the id is not found (e.g. fallback), use the recommendation instead.\n\nFor every NEED_USER_INPUT placeholder in the spec:\n- Replace it with a concrete resolution grounded in the chosen alternative (title, pros, cons from clarify.json).\n- If a placeholder cannot be fully resolved by the chosen alternative, document it as an explicit design decision or open question — never leave bare NEED_USER_INPUT tags.\n\nWrite the resolved spec back to " + triggers.output_path + " (overwrite in place). Leave sections without placeholders unchanged."'
      transitions:
        - to: finalize
    - id: finalize
      operator: CommandOperator
      params:
        shell: true
        env:
          OUT:
            $expr: triggers.output_path
        cmd: echo Enriched spec written to $OUT
        capture_stdout: false
      terminal: success
    - id: task-1
      operator: AgentOperator
      params: {}
      transitions: []
