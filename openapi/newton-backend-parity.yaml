openapi: 3.1.0
info:
  title: Newton Backend Parity API
  description: Contract for Rust `newton serve` parity endpoints sourced from Rust DTOs and handlers.
  contact:
    name: Newton Loop Framework
  license:
    name: ''
  version: 0.5.122
servers:
- url: /api/v1
paths:
  /change-requests:
    get:
      tags:
      - change-requests
      operationId: list_change_requests
      parameters:
      - name: status
        in: query
        description: Optional change request status filter
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Change request list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChangeRequestItem'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
      - change-requests
      operationId: create_change_request
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChangeRequestBody'
        required: true
      responses:
        '201':
          description: Created change request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRequestItem'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /change-requests/{id}:
    get:
      tags:
      - change-requests
      operationId: get_change_request
      parameters:
      - name: id
        in: path
        description: Change request id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Change request detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRequestItem'
        '404':
          description: Change request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    patch:
      tags:
      - change-requests
      operationId: patch_change_request
      parameters:
      - name: id
        in: path
        description: Change request id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchChangeRequestBody'
        required: true
      responses:
        '200':
          description: Updated change request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRequestItem'
        '404':
          description: Change request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /components:
    get:
      tags:
      - dashboard
      operationId: list_components
      responses:
        '200':
          description: Component list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComponentItem'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
      - catalog
      operationId: create_component
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateComponentBody'
        required: true
      responses:
        '201':
          description: Created component
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentItem'
        '404':
          description: Referenced product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /components/{id}:
    get:
      tags:
      - catalog
      operationId: get_component
      parameters:
      - name: id
        in: path
        description: Component ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Component
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentItem'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    put:
      tags:
      - catalog
      operationId: put_component
      parameters:
      - name: id
        in: path
        description: Component ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutComponentBody'
        required: true
      responses:
        '200':
          description: Updated component
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentItem'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
      - catalog
      operationId: delete_component
      parameters:
      - name: id
        in: path
        description: Component ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedItem'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    patch:
      tags:
      - catalog
      operationId: patch_component
      parameters:
      - name: id
        in: path
        description: Component ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchComponentBody'
        required: true
      responses:
        '200':
          description: Patched component
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentItem'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /eval-runs:
    get:
      tags:
      - catalog
      operationId: list_eval_runs
      parameters:
      - name: scope
        in: query
        description: Filter by scope
        required: false
        schema:
          type: string
      - name: scopeId
        in: query
        description: Filter by scope id
        required: false
        schema:
          type: string
      - name: source
        in: query
        description: Filter by source
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: Limit results
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      responses:
        '200':
          description: EvalRun list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EvalRunItem'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
      - catalog
      operationId: create_eval_run
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvalRunBody'
        required: true
      responses:
        '201':
          description: Created EvalRun
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvalRunItem'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /eval-runs/{id}:
    get:
      tags:
      - catalog
      operationId: get_eval_run
      parameters:
      - name: id
        in: path
        description: EvalRun ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: EvalRun
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvalRunItem'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /eval-runs/{id}/grades:
    get:
      tags:
      - catalog
      operationId: list_eval_run_grades
      parameters:
      - name: id
        in: path
        description: EvalRun ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Grades for the EvalRun
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GradeItem'
        '404':
          description: EvalRun not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /executions:
    get:
      tags:
      - executions
      operationId: list_executions
      parameters:
      - name: planId
        in: query
        description: Optional plan id filter
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Execution list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExecutionItem'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /findings:
    get:
      tags:
      - findings
      operationId: list_findings
      parameters:
      - name: status
        in: query
        description: Optional finding status filter
        required: false
        schema:
          type: string
      - name: scope
        in: query
        description: 'Scope kind: component | repo | module'
        required: false
        schema:
          type: string
      - name: scope_id
        in: query
        description: Optional scope entity id filter
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Finding list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FindingItem'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
      - findings
      operationId: create_finding
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFindingBody'
        required: true
      responses:
        '201':
          description: Created or upserted finding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingItem'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /findings/{id}:
    get:
      tags:
      - findings
      operationId: get_finding
      parameters:
      - name: id
        in: path
        description: Finding id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Finding detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingItem'
        '404':
          description: Finding not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    patch:
      tags:
      - findings
      operationId: patch_finding
      parameters:
      - name: id
        in: path
        description: Finding id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchFindingBody'
        required: true
      responses:
        '200':
          description: Updated finding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingItem'
        '404':
          description: Finding not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /findings/{id}/unblock:
    post:
      tags:
      - findings
      operationId: unblock_finding
      parameters:
      - name: id
        in: path
        description: Finding id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Unblocked finding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingItem'
        '404':
          description: Finding not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Finding is not blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /grades:
    get:
      tags:
      - catalog
      operationId: list_grades
      parameters:
      - name: runId
        in: query
        description: Filter by EvalRun id
        required: false
        schema:
          type: string
      - name: kpiId
        in: query
        description: Filter by KPI id
        required: false
        schema:
          type: string
      responses:
        '200':
          description: List of grades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GradeItem'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
      - catalog
      operationId: create_grade
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGradeBody'
        required: true
      responses:
        '201':
          description: Created grade
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GradeItem'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /grades/{id}:
    get:
      tags:
      - catalog
      operationId: get_grade
      parameters:
      - name: id
        in: path
        description: Grade id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Grade
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GradeItem'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /hil/instances:
    get:
      tags:
      - hil
      summary: List distinct workflow instance IDs that currently have HIL events.
      operationId: list_hil_instances
      responses:
        '200':
          description: HIL workflow instance ids
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /hil/workflows/{id}:
    get:
      tags:
      - hil
      operationId: list_hil_events
      parameters:
      - name: id
        in: path
        description: Workflow instance id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: HIL event list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HilEvent'
  /hil/workflows/{id}/{event_id}/action:
    post:
      tags:
      - hil
      operationId: submit_hil_action
      parameters:
      - name: id
        in: path
        description: Workflow instance id
        required: true
        schema:
          type: string
      - name: event_id
        in: path
        description: HIL event id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HilAction'
        required: true
      responses:
        '200':
          description: Resolved HIL event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HilEvent'
        '404':
          description: HIL event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /kpis:
    get:
      tags:
      - catalog
      operationId: list_kpis
      responses:
        '200':
          description: KPI list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KpiItem'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
      - catalog
      operationId: create_kpi
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKpiBody'
        required: true
      responses:
        '201':
          description: Created or upserted KPI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KpiItem'
        '409':
          description: Conflict (name uniqueness violated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /kpis/{id}:
    get:
      tags:
      - catalog
      operationId: get_kpi
      parameters:
      - name: id
        in: path
        description: KPI ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: KPI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KpiItem'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /module-dependencies:
    get:
      tags:
      - portfolio
      operationId: list_module_dependencies
      responses:
        '200':
          description: Module dependency list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModuleDependencyItem'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
      - portfolio
      operationId: create_module_dependency
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModuleDependencyBody'
        required: true
      responses:
        '201':
          description: Created module dependency
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleDependencyItem'
        '404':
          description: Module not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Dependency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /module-dependencies/{id}:
    get:
      tags:
      - catalog
      operationId: get_module_dependency
      parameters:
      - name: id
        in: path
        description: ModuleDependency ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ModuleDependency
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleDependencyItem'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
      - catalog
      operationId: delete_module_dependency
      parameters:
      - name: id
        in: path
        description: ModuleDependency ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedItem'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    patch:
      tags:
      - catalog
      operationId: patch_module_dependency
      parameters:
      - name: id
        in: path
        description: ModuleDependency ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchModuleDependencyBody'
        required: true
      responses:
        '200':
          description: Patched module dependency
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleDependencyItem'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /modules:
    get:
      tags:
      - catalog
      operationId: list_modules
      responses:
        '200':
          description: Module list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModuleItem'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
      - catalog
      operationId: create_module
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModuleBody'
        required: true
      responses:
        '201':
          description: Created module
