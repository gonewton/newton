version: "2.0"
mode: "workflow_graph"
metadata:
  name: "Scenario 38: Nested Workflow Error Propagation"
workflow:
  settings:
    entry_task: "call_child"
    max_time_seconds: 60
    parallel_limit: 1
    continue_on_error: false
    max_task_iterations: 10
    max_workflow_iterations: 100
  tasks:
    - id: "call_child"
      operator: "WorkflowOperator"
      params:
        workflow_path: "./10_assert_completed_fail.yaml"
      terminal: success

