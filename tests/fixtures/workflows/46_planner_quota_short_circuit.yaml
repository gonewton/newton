version: "2.0"
mode: workflow_graph
workflow:
  settings:
    entry_task: enrich_spec
    max_time_seconds: 60
    parallel_limit: 1
    continue_on_error: false
    default_engine: agent
    max_task_iterations: 3
    max_workflow_iterations: 10
  tasks:
    - id: enrich_spec
      operator: AgentOperator
      params:
        engine: agent
        prompt: "planner enrichment request"
      transitions:
        - to: update_board_body

    - id: update_board_body
      operator: NoOpOperator
      params: {}
      transitions:
        - to: move_to_backlog

    - id: move_to_backlog
      operator: NoOpOperator
      params: {}
      terminal: success
