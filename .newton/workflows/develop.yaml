version: '2.0'
mode: workflow_graph
metadata:
  name: develop-workflow
  description: 'Implement from a Plan id or raw_spec_path. Pluggable delivery: local (ff-merge) or pr.'
triggers:
  type: manual
  schema_version: '1.0'
  payload:
    plan_id: ''
    raw_spec_path: ''
    workspace: ''
    delivery: 'local'
    test_cmd: './scripts/run-tests.sh'
    skip_gh_pr_approve: 'true'
workflow:
  settings:
    entry_task: clean_check
    max_time_seconds: 604800
    parallel_limit: 1
    continue_on_error: false
    max_task_iterations: 15000
    max_workflow_iterations: 500
    default_engine: opencode
    command_operator:
      allow_shell: true
    artifact_storage:
      base_path: .newton/artifacts
      max_inline_bytes: 4194304
      max_artifact_bytes: 104857600
      max_total_bytes: 1073741824
      retention_hours: 168
      cleanup_policy: lru
  context:
    preamble: |-
      Implement the following spec in the target source code target.
      After you have applied the changes and the test command completes with no errors, print exactly <status>COMPLETED</status> in your final output.
    codescene_preamble: Fix code health issues reported by CodeScene. Work in the target source code base; run the configured test command to verify. Do not require a COMPLETED marker.
    precommit_fix_preamble: |-
      The pre-commit hook rejected a commit. The full hook output is below.
      Fix all reported issues in the codebase. Run the configured test command to verify.
      Do not attempt to commit; only fix the code.
    validation_preamble: |-
      You are a reviewer. You will be given the spec path (read the spec file in the workspace) and a bounded diff vs main (stat plus truncated patch).
      Determine whether the provided diff fully implements the given spec.
      Reply with exactly one of <status>VALID</status> or <status>INVALID</status>.
      If INVALID, include a single block <feedback>...</feedback> with clear, actionable feedback.
  tasks:
    - id: clean_check
      operator: GitOperator
      params:
        operation: clean_check
      transitions:
        - to: sync_main
          priority: 0
          when:
            $expr: tasks.clean_check.output.ok == true
        - to: fail_dirty_tree
          priority: 10
      name: Check clean working tree
    - id: fail_dirty_tree
      operator: CommandOperator
      params:
        shell: true
        cmd: |
          echo "Precondition failed: working tree has changes. Commit or stash before develop." >&2
          exit 1
        capture_stdout: false
      terminal: failure
    - id: sync_main
      operator: GitOperator
      params:
        operation: sync_main
      transitions:
        - to: prepare_spec_paths
      name: Sync main branch
    - id: prepare_spec_paths
      operator: CommandOperator
      params:
        shell: true
        capture_stdout: true
        env:
          PLAN_ID:
            $expr: triggers.plan_id
          RAW_SPEC:
            $expr: triggers.raw_spec_path
          WORKSPACE:
            $expr: 'triggers.workspace'
        cmd: |
          set -eo pipefail
          mkdir -p .newton/plan tmp
          if [ -n "$PLAN_ID" ]; then
            OUT="tmp/plan-${PLAN_ID}.md"
            newton data get plan "$PLAN_ID" --workspace "${WORKSPACE:-.}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('body',''))" > "$OUT"
            BRANCH="feature/plan-${PLAN_ID}"
          elif [ -n "$RAW_SPEC" ] && [ -f "$RAW_SPEC" ]; then
            OUT="$RAW_SPEC"
            SLUG=$(basename "$RAW_SPEC" .md | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//')
            BRANCH="feature/${SLUG}"
          else
            echo "prepare_spec_paths: set plan_id or raw_spec_path to an existing file" >&2
            exit 1
          fi
          printf '%s\n' "$OUT" > .newton/plan/.develop-prompt-path
          printf '%s\n' "$BRANCH" > .newton/plan/.develop-branch
          echo "spec_path=$OUT"
      transitions:
        - to: read_develop_spec_path
    - id: read_develop_spec_path
      operator: CommandOperator
      params:
        shell: true
        capture_stdout: true
        cmd: |
          set -eo pipefail
          printf '%s' "$(cat .newton/plan/.develop-prompt-path)"
      transitions:
        - to: create_branch
    - id: create_branch
      operator: GitOperator
      params:
        operation: create_branch
        name:
          $expr: '"feature/plan-" + triggers.plan_id'
      transitions:
        - to: load_spec
      name: Create Branch
    - id: load_spec
      operator: CommandOperator
      params:
        shell: true
        env:
          SPEC_PATH:
            $expr: tasks.read_develop_spec_path.output.stdout
        cmd: |
          set -e
          cat "$SPEC_PATH"
        capture_stdout: true
        capture_stderr: true
      transitions:
        - to: implement_spec
    - id: implement_spec
      operator: AgentOperator
      max_iterations: 3
      params:
        engine:
          $expr: develop_primary_engine
        model:
          $expr: develop_primary_model
        prompt:
          $expr: 'context.preamble + "\n\nSpec path: " + tasks.read_develop_spec_path.output.stdout + "\n\nSpec content:\n" + tasks.load_spec.output.stdout'
        signals:
          complete: <status>COMPLETED</status>
      transitions:
        - to: run_tests
          priority: 0
          when:
            $expr: tasks.implement_spec.output.signal == "complete"
        - to: retry_implementation
          priority: 10
    - id: run_tests
      max_iterations: 60
      operator: CommandOperator
      params:
        shell: true
        cmd:
          $expr: triggers.test_cmd
        capture_stdout: true
        capture_stderr: true
      transitions:
        - to: snapshot_commit
          priority: 0
          when:
            $expr: tasks.run_tests.output.success == true
        - to: fix_test_failures
          priority: 10
    - id: fix_test_failures
      operator: AgentOperator
      max_iterations: 3
      params:
        engine:
          $expr: develop_secondary_engine
        model:
          $expr: develop_secondary_model
        prompt:
          $expr: 'context.preamble + "\n\nSpec path: " + tasks.read_develop_spec_path.output.stdout + "\n\nSpec content:\n" + tasks.load_spec.output.stdout + "\n\nTests failed. Fix the issues and re-run the test command:\n" + tasks.run_tests.output.stdout'
      transitions:
        - to: run_tests
    - id: snapshot_commit
      max_iterations: 90
      operator: GitOperator
      params:
        operation: commit
        message:
          $expr: '"chore(develop): snapshot " + triggers.plan_id'
        allow_empty: false
      transitions:
        - to: get_diff
          priority: 0
          when:
            $expr: tasks.snapshot_commit.output.committed == true || tasks.snapshot_commit.output.skipped == true
        - to: fix_snapshot_precommit
          priority: 5
          when:
            $expr: tasks.snapshot_commit.output.precommit_failed == true
        - to: fix_snapshot_precommit
          priority: 10
    - id: fix_snapshot_precommit
      operator: AgentOperator
      max_iterations: 3
      params:
        engine:
          $expr: develop_secondary_engine
        model:
          $expr: develop_secondary_model
        prompt:
          $expr: context.precommit_fix_preamble + "\n\nPre-commit hook rejected the snapshot commit. Run the configured test command to verify fixes."
      transitions:
        - to: snapshot_commit
    - id: get_diff
      max_iterations: 60
      operator: GitOperator
      params:
        operation: diff
        base: main
        max_bytes: 262144
      transitions:
        - to: validation_preflight
    - id: validation_preflight
      operator: CommandOperator
      params:
        shell: true
        capture_stdout: true
        env:
          SPEC_PATH:
            $expr: tasks.read_develop_spec_path.output.stdout
        cmd: |
          set -e
          SPEC_BYTES=$(wc -c < "$SPEC_PATH" | tr -d ' ')
          DIFF_BYTES=$(git diff main...HEAD | wc -c | tr -d ' ')
          PREAMBLE_BUDGET=8192
          TOTAL=$((SPEC_BYTES + DIFF_BYTES + PREAMBLE_BUDGET))
          MAX_BYTES=400000
          echo "spec_bytes=$SPEC_BYTES diff_bytes=$DIFF_BYTES total_estimate=$TOTAL max_bytes=$MAX_BYTES"
          if [ "$TOTAL" -gt "$MAX_BYTES" ]; then
            echo "VALIDATION_PREFLIGHT: oversize"
            exit 1
          fi
          echo "VALIDATION_PREFLIGHT: ok"
      transitions:
        - to: validate_against_spec
          priority: 0
          when:
            $expr: 'contains(tasks.validation_preflight.output.stdout, "VALIDATION_PREFLIGHT: ok")'
        - to: fail_validation_oversized
          priority: 10
    - id: fail_validation_oversized
      operator: CommandOperator
      params:
        shell: true
        cmd: |
          echo "develop: validation preflight failed — spec+diff exceeds safe prompt budget." >&2
          exit 1
        capture_stdout: false
      terminal: failure
    - id: validate_against_spec
      max_iterations: 3
      operator: AgentOperator
      params:
        engine:
          $expr: develop_primary_engine
        model:
          $expr: develop_primary_model
        require_signal: true
        prompt:
          $expr: 'context.validation_preamble + "\n\nSpec path (read in workspace): " + tasks.read_develop_spec_path.output.stdout + "\n\nDiff vs main (stat + bounded diff):\n" + tasks.get_diff.output.stat + "\n\n" + tasks.get_diff.output.patch'
        signals:
          valid: <status>VALID</status>
          invalid: <status>INVALID</status>
      transitions:
        - to: analyze_code_health
          priority: 0
          when:
            $expr: tasks.validate_against_spec.output.signal == "valid"
        - to: load_validation_feedback
          priority: 10
          when:
            $expr: tasks.validate_against_spec.output.signal == "invalid"
    - id: load_validation_feedback
      operator: CommandOperator
      params:
        shell: true
        capture_stdout: true
        env:
          VALIDATION_STDOUT_ARTIFACT:
            $expr: tasks.validate_against_spec.output.stdout_artifact
        cmd: cat "$VALIDATION_STDOUT_ARTIFACT"
      transitions:
        - to: implement_feedback
    - id: implement_feedback
      operator: AgentOperator
      max_iterations: 5
      params:
        engine:
          $expr: develop_primary_engine
        model:
          $expr: develop_primary_model
        prompt:
          $expr: 'context.preamble + "\n\nSpec path: " + tasks.read_develop_spec_path.output.stdout + "\n\nSpec content:\n" + tasks.load_spec.output.stdout + "\n\nValidation feedback (address and re-run tests):\n" + tasks.load_validation_feedback.output.stdout'
        signals:
          complete: <status>COMPLETED</status>
      transitions:
        - to: run_tests
    - id: analyze_code_health
      operator: CommandOperator
      params:
        shell: true
        cmd: cs delta --output-format json
        capture_stdout: true
      transitions:
        - to: fix_code_health
          priority: 0
          when:
            $expr: contains(tasks.analyze_code_health.output.stdout, "{")
        - to: git_stage
          priority: 10
    - id: fix_code_health
      operator: AgentOperator
      params:
        engine:
          $expr: develop_secondary_engine
        model:
          $expr: develop_secondary_model
        prompt:
          $expr: context.codescene_preamble + "\n\nCodeScene delta report (JSON):\n" + tasks.analyze_code_health.output.stdout
      transitions:
        - to: git_stage
    - id: git_stage
      operator: GitOperator
      params:
        operation: stage
        exclude:
          - "test_results.*"
      transitions:
        - to: no_changes_done
          priority: 0
          when:
            $expr: tasks.git_stage.output.has_staged == false
        - to: git_commit
          priority: 10
          when:
            $expr: tasks.git_stage.output.has_staged == true
    - id: no_changes_done
      operator: CommandOperator
      params:
        shell: true
        cmd: echo "No changes to commit; skipping delivery."
        capture_stdout: false
      terminal: success
    - id: git_commit
      operator: GitOperator
      params:
        operation: commit
        message:
          $expr: '"feat: implement plan " + triggers.plan_id'
        allow_empty: false
      transitions:
        - to: route_delivery
          priority: 0
          when:
            $expr: tasks.git_commit.output.committed == true || tasks.git_commit.output.skipped == true
        - to: fix_final_precommit
          priority: 5
          when:
            $expr: tasks.git_commit.output.precommit_failed == true
        - to: fix_final_precommit
          priority: 10
    - id: fix_final_precommit
      operator: AgentOperator
      max_iterations: 3
      params:
        engine:
          $expr: develop_secondary_engine
        model:
          $expr: develop_secondary_model
        prompt:
          $expr: context.precommit_fix_preamble + "\n\nPre-commit hook rejected the final commit. Run the configured test command to verify fixes."
      transitions:
        - to: git_commit

    # ── Delivery routing ────────────────────────────────────────────────────────
    - id: route_delivery
      operator: CommandOperator
      params:
        shell: true
        cmd: 'echo "routing delivery: ${DELIVERY}"'
        capture_stdout: false
        env:
          DELIVERY:
            $expr: triggers.delivery
      transitions:
        - to: local_merge
          priority: 0
          when:
            $expr: triggers.delivery == "local"
        - to: git_push
          priority: 10

    # ── Local delivery ──────────────────────────────────────────────────────────
    - id: local_merge
      operator: CommandOperator
      params:
        shell: true
        capture_stdout: true
        env:
          BRANCH:
            $expr: '"feature/plan-" + triggers.plan_id'
          PLAN_ID:
            $expr: triggers.plan_id
          WORKSPACE:
            $expr: 'triggers.workspace'
        cmd: |
          set -eo pipefail
          git checkout main
          git merge --ff-only "$BRANCH" || git merge --no-edit "$BRANCH"
          echo "local_merge: merged $BRANCH into main"
          # Update Plan status to complete
          if [ -n "$PLAN_ID" ]; then
            newton data patch plan "$PLAN_ID" --workspace "${WORKSPACE:-.}" \
              --body '{"status":"complete"}' || true
          fi
      transitions:
        - to: success

    # ── PR delivery ─────────────────────────────────────────────────────────────
    - id: git_push
      operator: GitOperator
      params:
        operation: push
        remote: origin
        set_upstream: true
        retry_count: 3
        retry_delay_ms: 5000
      transitions:
        - to: gh_create_pr
    - id: gh_create_pr
      operator: GhOperator
      params:
        operation: pr_create
        base: main
        title:
          $expr: '"feat: implement plan " + triggers.plan_id'
        body: Implements plan. Merge with squash.
        retry_count: 3
        retry_delay_ms: 5000
      transitions:
        - to: poll_pr
          priority: 0
          when:
            $expr: triggers.skip_gh_pr_approve == "true"
        - to: gh_approve_pr
          priority: 10
          when:
            $expr: triggers.skip_gh_pr_approve != "true"
    - id: gh_approve_pr
      operator: GhOperator
      params:
        operation: pr_approve
        pr_number:
          $expr: tasks.gh_create_pr.output.pr_number
      transitions:
        - to: poll_pr
    - id: poll_pr
      operator: GhOperator
      max_iterations: 15000
      timeout_ms: 120000
      params:
        operation: pr_view
        pr:
          $expr: tasks.gh_create_pr.output.pr_number
      transitions:
        - to: merge_git_cleanup
          priority: 0
          when:
            $expr: tasks.poll_pr.output.state == "MERGED"
        - to: fail_pr_closed
          priority: 1
          when:
            $expr: tasks.poll_pr.output.state == "CLOSED"
        - to: sleep_merge_wait
          priority: 5
          when:
            $expr: tasks.poll_pr.output.state == "OPEN"
        - to: sleep_merge_unknown
          priority: 10
      name: Wait for PR Acceptance
    - id: sleep_merge_wait
      operator: CommandOperator
      max_iterations: 15000
      params:
        shell: true
        cmd: sleep 60
        capture_stdout: false
      transitions:
        - to: poll_pr
    - id: sleep_merge_unknown
      operator: CommandOperator
      max_iterations: 15000
      params:
        shell: true
        cmd: echo "Unexpected PR state; waiting 30s"; sleep 30
        capture_stdout: false
      transitions:
        - to: poll_pr
    - id: fail_pr_closed
      operator: CommandOperator
      params:
        shell: true
        cmd: echo "PR closed without merge" >&2; exit 1
        capture_stdout: false
      terminal: failure
    - id: merge_git_cleanup
      operator: GitOperator
      timeout_ms: 600000
      params:
        operation: cleanup_merge
      transitions:
        - to: mark_plan_complete_pr

    - id: mark_plan_complete_pr
      operator: CommandOperator
      params:
        shell: true
        capture_stdout: false
        env:
          PLAN_ID:
            $expr: triggers.plan_id
          WORKSPACE:
            $expr: 'triggers.workspace'
        cmd: |
          if [ -n "$PLAN_ID" ]; then
            newton data patch plan "$PLAN_ID" --workspace "${WORKSPACE:-.}" \
              --body '{"status":"complete"}' || true
          fi
      transitions:
        - to: success

    - id: success
      operator: CommandOperator
      params:
        shell: true
        cmd: 'echo "develop: completed plan ${PLAN_ID}"'
        capture_stdout: false
        env:
          PLAN_ID:
            $expr: triggers.plan_id
      terminal: success
    - id: retry_implementation
      operator: CommandOperator
      max_iterations: 3
      params:
        shell: true
        cmd: echo "Job failed (status != COMPLETED), retrying implement_spec task..."
        capture_stdout: false
      transitions:
        - to: implement_spec
