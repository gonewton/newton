# Batch config for project_id "newton"
# When running from inside gonewton/newton, use: newton batch newton --workspace /home/sysuser/ws001

project_root=/home/sysuser/ws001/gonewton/newton
coding_agent=codex
coding_model=gpt-5.1-codex-mini
resume=true
pre_run_script=/home/sysuser/ws001/.newton/scripts/pre-run.sh
max_iterations=5
max_time=3600
control_file=newton_control.json

# Optional: run after a successful plan (commit/push/PR). Non-zero exit moves plan to failed.
post_success_script=/home/sysuser/ws001/.newton/scripts/post-success.sh

# Optional: run after a failed plan (cleanup, notify).
post_fail_script=/home/sysuser/ws001/.newton/scripts/post-fail.sh
