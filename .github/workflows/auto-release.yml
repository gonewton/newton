name: Auto Release

# Triggers on every push to main (excluding pure doc/workflow changes) and
# cuts a new patch release by:
#   1. Computing the next patch version from the last git tag (not from
#      Cargo.toml), so releases fire on every merge without requiring a
#      manual version bump.
#   2. Creating an auto-release branch, bumping Cargo.toml, tagging, and
#      pushing — which triggers the Release workflow via the v*.*.* tag.
#
# Escape hatch: include "[skip release]" in the commit message to suppress.
#
# Concurrency: at most one auto-release run at a time on main; later pushes
# cancel in-progress runs so versions don't collide.

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'

concurrency:
  group: auto-release-main
  cancel-in-progress: true

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  auto-release:
    name: Auto Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: gonewton

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Compute next version from last tag
        id: next-version
        run: |
          # Derive the next patch release from the most recent reachable tag so
          # every merge to main triggers a release — no manual version bump needed.
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LAST_VERSION=${LAST_TAG#v}
          IFS='.' read -r major minor patch <<< "$LAST_VERSION"
          NEXT_PATCH=$((patch + 1))
          NEXT_VERSION="$major.$minor.$NEXT_PATCH"

          # Guard: if Cargo.toml is already at or ahead of the tag-derived version
          # (e.g. a prior auto-release PR was merged without a matching tag), advance
          # past the Cargo.toml version so the version bump is never a no-op.
          CARGO_VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          IFS='.' read -r cmaj cmin cpatch <<< "$CARGO_VERSION"
          if [ "$cmaj" = "$major" ] && [ "$cmin" = "$minor" ] && [ "$cpatch" -ge "$NEXT_PATCH" ]; then
            NEXT_PATCH=$((cpatch + 1))
            NEXT_VERSION="$major.$minor.$NEXT_PATCH"
            echo "Cargo.toml already at $CARGO_VERSION — advancing to $NEXT_VERSION"
          fi

          echo "last_tag=$LAST_TAG"
          echo "cargo_version=$CARGO_VERSION"
          echo "next_version=$NEXT_VERSION"
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "branch_name=auto-release-$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Create release branch
        id: create-branch
        run: |
          BRANCH_NAME="${{ steps.next-version.outputs.branch_name }}"

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Clean up any stale branch from a previous concurrent run.
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            echo "Remote branch $BRANCH_NAME exists, deleting it..."
            git push origin --delete "$BRANCH_NAME" || true
          fi
          if git show-ref --verify --quiet "refs/heads/$BRANCH_NAME"; then
            git branch -D "$BRANCH_NAME" || true
          fi

          git checkout -b "$BRANCH_NAME"

      - name: Set version in Cargo.toml
        run: |
          CURRENT_VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          NEXT_VERSION="${{ steps.next-version.outputs.next_version }}"
          sed -i "s/^version = \"$CURRENT_VERSION\"/version = \"$NEXT_VERSION\"/" Cargo.toml
          echo "Bumped Cargo.toml: $CURRENT_VERSION → $NEXT_VERSION"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.94

      - name: Regenerate OpenAPI parity spec
        run: ./scripts/generate-openapi.sh

      - name: Commit version bump
        run: |
          NEXT_VERSION="${{ steps.next-version.outputs.next_version }}"
          git add Cargo.toml Cargo.lock openapi/newton-backend-parity.yaml
          if git diff --cached --quiet; then
            echo "::error::Nothing staged after version bump to $NEXT_VERSION — Cargo.toml may already be at this version. Investigate version/tag drift."
            exit 1
          fi
          git commit -m "chore: bump version to $NEXT_VERSION"

      - name: Push release branch
        run: |
          git push --force-with-lease origin "${{ steps.next-version.outputs.branch_name }}"

      - name: Create or update Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          NEXT_VERSION="${{ steps.next-version.outputs.next_version }}"
          BRANCH_NAME="${{ steps.next-version.outputs.branch_name }}"
          PR_TITLE="chore: release v$NEXT_VERSION"

          # Write body to a file so that COMMIT_MSG (which may contain backticks,
          # dollar signs, or other shell metacharacters from a prior squash-merge)
          # is never re-interpreted by bash.
          printf 'Automated release for version %s\n\nThis PR was created by the auto-release workflow. Merging it brings\nthe bumped version back into `main`.\n\n**What triggered this release:**\nCommit: %s\nMessage: %s\n' \
            "$NEXT_VERSION" "$COMMIT_SHA" "$COMMIT_MSG" > /tmp/pr_body.md

          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #$EXISTING_PR..."
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body-file /tmp/pr_body.md
          else
            echo "Creating PR for $BRANCH_NAME..."
            gh pr create \
              --title "$PR_TITLE" \
              --body-file /tmp/pr_body.md \
              --base main \
              --head "$BRANCH_NAME" \
              --label "auto-release" \
              --draft
          fi

      - name: Tag and push (triggers Release workflow)
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -e
          NEXT_VERSION="${{ steps.next-version.outputs.next_version }}"
          TAG="v$NEXT_VERSION"
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git"
          HEAD_SHA=$(git rev-parse HEAD)
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            if [ "$(git rev-parse "$TAG^{commit}")" = "$HEAD_SHA" ]; then
              git push origin "$TAG"
            else
              git tag -f "$TAG"
              git push -f origin "$TAG"
            fi
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

  cleanup-old-releases:
    name: Cleanup Old Release Branches
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: gonewton

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Delete merged release branches
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "Cleaning up old auto-release branches..."

          RELEASE_BRANCHES=$(git branch -r | grep 'origin/auto-release-' | sed 's|origin/||' || true)

          if [ -z "$RELEASE_BRANCHES" ]; then
            echo "No auto-release branches found to clean up"
            exit 0
          fi

          for BRANCH in $RELEASE_BRANCHES; do
            echo "Checking branch: $BRANCH"
            PR_STATE=$(gh pr list --head "$BRANCH" --state all --json state,mergedAt --jq '.[0] | select(.mergedAt != null) | .state' || echo "")

            if [ "$PR_STATE" = "MERGED" ]; then
              echo "PR for $BRANCH is merged, deleting branch..."
              git push origin --delete "$BRANCH" || echo "Failed to delete $BRANCH (may already be deleted)"
            else
              BRANCH_AGE=$(git log -1 --format=%ct "origin/$BRANCH" 2>/dev/null || echo "0")
              CURRENT_TIME=$(date +%s)
              AGE_DAYS=$(( (CURRENT_TIME - BRANCH_AGE) / 86400 ))
              if [ "$AGE_DAYS" -gt 7 ]; then
                PR_EXISTS=$(gh pr list --head "$BRANCH" --state all --json number --jq '.[0].number' || echo "")
                if [ -z "$PR_EXISTS" ]; then
                  echo "Branch $BRANCH is $AGE_DAYS days old with no PR, deleting..."
                  git push origin --delete "$BRANCH" || echo "Failed to delete $BRANCH"
                fi
              fi
            fi
          done

          echo "Cleanup complete"
