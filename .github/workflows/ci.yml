name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-D warnings"
    steps:
       - name: Checkout repository
         uses: actions/checkout@v4

       - name: Install Rust toolchain
         uses: actions-rust-lang/setup-rust-toolchain@v1
         with:
           toolchain: 1.94
           components: rustfmt, clippy

       - name: Cache Cargo registry
         uses: actions/cache@v4
         with:
           path: |
             ~/.cargo/registry
             ~/.cargo/git
             target
           key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
           restore-keys: |
             ${{ runner.os }}-cargo-

       - name: Check formatting
         run: cargo fmt --all -- --check

       - name: Verify OpenAPI parity contract
         run: |
           ./scripts/generate-openapi.sh
           git diff --exit-code openapi/newton-backend-parity.yaml

       - name: Validate AsyncAPI realtime contract
         run: npx -y @asyncapi/cli@3 validate openapi/newton-realtime.asyncapi.yaml

       - name: Run clippy
         run: cargo clippy --all-targets --all-features -- -D warnings

       - name: Build
         run: cargo build --workspace --release

       - name: Set up Python (optimize-loop fixture test)
         uses: actions/setup-python@v5
         with:
           python-version: '3.12'

       - name: Install pytest
         run: python3 -m pip install pytest

       - name: Run tests
         run: cargo test --workspace --all-features

       - name: Verify newton-core has no CLI/TUI deps
         run: |
           if cargo tree -p newton-core --prefix none 2>/dev/null | grep -Eq '^(clap|ratatui|crossterm)( |$)'; then
             echo "newton-core must not depend on clap/ratatui/crossterm"
             exit 1
           fi

       - name: Upload binary artifact
         uses: actions/upload-artifact@v4
         with:
           name: newton-linux-x86_64
           path: target/release/newton

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.94

      - name: Cache cargo-audit binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-audit*
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-audit-v0.22.0

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.0

      - name: Run security audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104
          # RUSTSEC-2023-0071: rsa 0.9.10 (Marvin attack) — no upstream fix available
          # RUSTSEC-2026-0098/0099/0104: rustls-webpki 0.101.7 — locked in by ailoop-core
          #   reqwest 0.11 dep; unfixable until ailoop upgrades to reqwest 0.12
  newton-dsl-py:
    name: newton-dsl-py
    runs-on: ubuntu-latest
    needs: ci
    defaults:
      run:
        working-directory: packages/newton-dsl-py
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download newton binary
        uses: actions/download-artifact@v4
        with:
          name: newton-linux-x86_64
          path: /usr/local/bin
      - run: chmod +x /usr/local/bin/newton

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Check codegen drift
        run: uv run bash codegen/check_drift.sh

      - name: Validate emitted YAML against engine schema
        run: |
          for case_dir in ../workflow-schema/conformance/cases/*/; do
            expected="${case_dir}expected.yaml"
            if [ -f "$expected" ]; then
              newton workflow validate "$expected" && echo "PASS: $expected"
            fi
          done

  newton-dsl-ts:
    name: newton-dsl-ts
    runs-on: ubuntu-latest
    needs: ci
    defaults:
      run:
        working-directory: packages/newton-dsl-ts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download newton binary
        uses: actions/download-artifact@v4
        with:
          name: newton-linux-x86_64
          path: /usr/local/bin
      - run: chmod +x /usr/local/bin/newton

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.21.0"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: packages/newton-dsl-ts/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Check codegen drift
        run: pnpm run check-drift

      - name: Validate emitted YAML against engine schema
        run: |
          for case_dir in ../workflow-schema/conformance/cases/*/; do
            expected="${case_dir}expected.yaml"
            if [ -f "$expected" ]; then
              newton workflow validate "$expected" && echo "PASS: $expected"
            fi
          done

  web-ui-vendor-drift:
    name: Web UI vendor drift
    runs-on: ubuntu-latest
    # The embedded UI bundle (crates/core/assets/web/index.html.gz) is vendored
    # from the SEPARATE, PRIVATE gonewton/newton-ui repo via scripts/vendor-web.sh.
    # This job rebuilds the UI and fails if the committed bundle is stale. Because
    # newton-ui is private, it only runs when a read-only PAT is configured as the
    # NEWTON_UI_RO_TOKEN secret; otherwise it is a no-op (forks / unconfigured
    # repos stay green). The vite build is deterministic, so the exact-content
    # comparison is not flaky as long as this job's pinned node/pnpm match the
    # versions used when vendoring.
    steps:
      - name: Checkout newton
        uses: actions/checkout@v4

      - name: Detect newton-ui token
        id: tok
        env:
          NEWTON_UI_RO_TOKEN: ${{ secrets.NEWTON_UI_RO_TOKEN }}
        run: |
          if [ -n "$NEWTON_UI_RO_TOKEN" ]; then
            echo "has=true" >> "$GITHUB_OUTPUT"
          else
            echo "has=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NEWTON_UI_RO_TOKEN not set; skipping embedded-UI drift check."
          fi

      - name: Checkout newton-ui
        if: steps.tok.outputs.has == 'true'
        uses: actions/checkout@v4
        with:
          repository: gonewton/newton-ui
          token: ${{ secrets.NEWTON_UI_RO_TOKEN }}
          path: newton-ui

      - name: Set up pnpm
        if: steps.tok.outputs.has == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: "10.21.0"

      - name: Set up Node.js
        if: steps.tok.outputs.has == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: newton-ui/pnpm-lock.yaml

      - name: Install newton-ui dependencies
        if: steps.tok.outputs.has == 'true'
        run: cd newton-ui && pnpm install --frozen-lockfile

      - name: Verify embedded UI bundle is up to date
        if: steps.tok.outputs.has == 'true'
        run: scripts/vendor-web.sh --check ./newton-ui

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.94

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Set up Python (optimize-loop fixture test)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: python3 -m pip install pytest

      - name: Run workflow-graph coverage
        run: |
          # Temporary broad gate: include all production source under src/**,
          # exclude vendored registry + test code. Raise this threshold as
          # coverage improves.
          cargo llvm-cov \
            --workspace \
            --ignore-filename-regex '(\.cargo/registry|^tests/|/tests/)' \
            --summary-only \
            --fail-under-lines 50
