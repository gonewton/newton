name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-D warnings"
    steps:
       - name: Checkout repository
         uses: actions/checkout@v4

       - name: Install Rust toolchain
         uses: actions-rust-lang/setup-rust-toolchain@v1
         with:
           toolchain: 1.94
           components: rustfmt, clippy

       - name: Cache Cargo registry
         uses: actions/cache@v4
         with:
           path: |
             ~/.cargo/registry
             ~/.cargo/git
             target
           key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
           restore-keys: |
             ${{ runner.os }}-cargo-

       - name: Check formatting
         run: cargo fmt --all -- --check

       - name: Verify OpenAPI parity contract
         run: |
           ./scripts/generate-openapi.sh
           git diff --exit-code openapi/newton-backend-parity.yaml

       - name: Validate AsyncAPI realtime contract
         run: npx -y @asyncapi/cli@3 validate openapi/newton-realtime.asyncapi.yaml

       - name: Run clippy
         run: cargo clippy --all-targets --all-features -- -D warnings

       - name: Build
         run: cargo build --workspace --release

       - name: Run tests
         run: cargo test --workspace --all-features

       - name: Verify newton-core has no CLI/TUI deps
         run: |
           if cargo tree -p newton-core --prefix none 2>/dev/null | grep -Eq '^(clap|ratatui|crossterm)( |$)'; then
             echo "newton-core must not depend on clap/ratatui/crossterm"
             exit 1
           fi

       - name: Upload binary artifact
         uses: actions/upload-artifact@v4
         with:
           name: newton-linux-x86_64
           path: target/release/newton

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.94

      - name: Cache cargo-audit binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-audit*
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-audit-v0.22.0

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.0

      - name: Run security audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104
          # RUSTSEC-2023-0071: rsa 0.9.10 (Marvin attack) — no upstream fix available
          # RUSTSEC-2026-0098/0099/0104: rustls-webpki 0.101.7 — locked in by ailoop-core
          #   reqwest 0.11 dep; unfixable until ailoop upgrades to reqwest 0.12
  newton-dsl-py:
    name: newton-dsl-py
    runs-on: ubuntu-latest
    needs: ci
    defaults:
      run:
        working-directory: packages/newton-dsl-py
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download newton binary
        uses: actions/download-artifact@v4
        with:
          name: newton-linux-x86_64
          path: /usr/local/bin
      - run: chmod +x /usr/local/bin/newton

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Check codegen drift
        run: uv run bash codegen/check_drift.sh

      - name: Validate emitted YAML against engine schema
        run: |
          for case_dir in ../workflow-schema/conformance/cases/*/; do
            expected="$case_dir/expected.yaml"
            if [ -f "$expected" ]; then
              newton validate "$expected" && echo "PASS: $expected"
            fi
          done

  newton-dsl-ts:
    name: newton-dsl-ts
    runs-on: ubuntu-latest
    needs: ci
    defaults:
      run:
        working-directory: packages/newton-dsl-ts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download newton binary
        uses: actions/download-artifact@v4
        with:
          name: newton-linux-x86_64
          path: /usr/local/bin
      - run: chmod +x /usr/local/bin/newton

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/newton-dsl-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check codegen drift
        run: npm run check-drift

      - name: Validate emitted YAML against engine schema
        run: |
          for case_dir in ../workflow-schema/conformance/cases/*/; do
            expected="$case_dir/expected.yaml"
            if [ -f "$expected" ]; then
              newton validate "$expected" && echo "PASS: $expected"
            fi
          done

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.94

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run workflow-graph coverage
        run: |
          # Temporary broad gate: include all production source under src/**,
          # exclude vendored registry + test code. Raise this threshold as
          # coverage improves.
          cargo llvm-cov \
            --workspace \
            --ignore-filename-regex '(\.cargo/registry|^tests/|/tests/)' \
            --summary-only \
            --fail-under-lines 50
